name: Go Build & Artifacts

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os: [linux, windows, darwin]
        arch: [amd64, arm64]
        exclude:
          - os: windows
            arch: arm64

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
        cache: true

    - name: Verify dependencies
      run: go mod download

    - name: Run Vet
      run: go vet ./...

    - name: Build
      run: |
        mkdir -p dist
        BINARY_NAME=gr
        if [ "${{ matrix.os }}" = "windows" ]; then
          BINARY_NAME=gr.exe
        fi
        OUTPUT_NAME="${BINARY_NAME}-${{ matrix.os }}-${{ matrix.arch }}"
        GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -v -o "dist/${OUTPUT_NAME}" ./cmd/gr

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: gr-${{ matrix.os }}-${{ matrix.arch }}
        path: dist/
        if-no-files-found: error
